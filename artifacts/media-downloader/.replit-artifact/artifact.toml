kind = "web"
previewPath = "/"
title = "Media Downloader"
version = "1.0.0"
id = "artifacts/media-downloader"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23454

[services.development]
run = "pnpm --filter @workspace/media-downloader run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/media-downloader", "run", "build" ]
publicDir = "artifacts/media-downloader/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23454"
BASE_PATH = "/"
